name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Bump version & generate CHANGELOG
        run: npx commit-and-tag-version
        env:
          GIT_AUTHOR_NAME: "gantiin-bot"
          GIT_AUTHOR_EMAIL: "bot@gantiin.app"
          GIT_COMMITTER_NAME: "gantiin-bot"
          GIT_COMMITTER_EMAIL: "bot@gantiin.app"

      - name: Push changes & tags
        run: git push --follow-tags origin main
